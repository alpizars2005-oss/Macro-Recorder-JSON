name: Cross-platform Python checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime dependency
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Verify dependency health
        run: python -m pip check

      - name: Compile Python source
        run: python -m compileall -q bootstrap.py macro_recorder.py macro_app tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate Linux launch scripts
        if: runner.os == 'Linux'
        run: bash -n run.sh run_linux.sh
